name: Generate and Deploy Bevy Unsafe Docs

on:
  schedule:
    # Trigger automatically once a day at midnight UTC
    - cron: '0 0 * * *' 
  # Allow manual triggering from the Actions tab
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout tool repository
        uses: actions/checkout@v4

      - name: Checkout Bevy source code (shallow clone)
        uses: actions/checkout@v4
        with:
          repository: bevyengine/bevy
          path: bevy_src
          fetch-depth: 1

      - name: Install Rust nightly toolchain
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: nightly
         
      - name: Install Bevy system dependencies (Linux)
        run: |
          sudo apt-get update
          sudo apt-get install -y g++ pkg-config libx11-dev libasound2-dev libudev-dev libwayland-dev libxkbcommon-dev alsa-utils

      - name: Extract unsafe APIs and generate HTML
        run: |
          mkdir -p docs
          python3 scripts/extract_bevy.py --bevy-dir ./bevy_src --output ./docs/index.html

      - name: Commit and push docs
        run: |
          git config --global user.email "action@github.com"
          git config --global user.name "GitHub Action"
          git add docs/

          if git diff --staged --quiet; then
            echo "No changes detected in Bevy unsafe APIs. Skipping commit."
          else
            git commit -m "docs(bevy): regenerate unsafe APIs due to upstream changes [skip ci]"
            
            git pull --rebase origin main
            git push
          fi
